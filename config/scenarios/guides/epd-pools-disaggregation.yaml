      extraContainerConfig:
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_ADMIN"
              - "NET_RAW"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      additionalVolumeMounts: []
      additionalVolumes: []

    inferenceExtension:
      pluginsConfigFile: "epd-prefill-config.yaml"
      pluginsCustomConfig:
        epd-prefill-config.yaml: |
          apiVersion: inference.networking.x-k8s.io/v1alpha1
          kind: EndpointPickerConfig
          plugins:
          - type: prefix-cache-scorer
          - type: queue-scorer
          - type: kv-cache-utilization-scorer
          - type: max-score-picker
          schedulingProfiles:
          - name: default
            plugins:
            - pluginRef: prefix-cache-scorer
              weight: 3
            - pluginRef: queue-scorer
              weight: 2
            - pluginRef: kv-cache-utilization-scorer
              weight: 2
            - pluginRef: max-score-picker

  # ==========================================================================
  # Stack 3: DECODE pool
  # ==========================================================================
  - name: epd-decode

    model:
      name: Qwen/Qwen3-32B-decode
      shortName: qwen-qwen3-32b-decode
      path: models/Qwen/Qwen3-32B
      huggingfaceId: Qwen/Qwen3-32B
